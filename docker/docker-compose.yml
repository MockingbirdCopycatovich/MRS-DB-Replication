name: mrs-replication

services:
  backend:
    build:
      context: ../backend
      dockerfile: MRS.Replication.Api/Dockerfile
    container_name: mrs-backend
    ports:
      - "5080:8080"
    volumes:
      # Lets Replica Manager drive the Docker Engine API to create/remove Postgres node
      # containers on the host — a local-demo simplification (grants host-Docker access to
      # the container), documented in the README.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mrs-net
    depends_on:
      - watchdog

  watchdog:
    build:
      context: ../backend
      dockerfile: MRS.Replication.Watchdog/Dockerfile
    container_name: mrs-watchdog
    ports:
      - "5081:8080"
    networks:
      - mrs-net

  frontend:
    build:
      context: ../frontend/MRS.Replication.Client
      dockerfile: Dockerfile
    container_name: mrs-frontend
    ports:
      - "4200:80"
    networks:
      - mrs-net
    depends_on:
      - backend
      - watchdog

networks:
  mrs-net:
    name: mrs-net
