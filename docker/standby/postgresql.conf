# ─────────────────────────────────────────────
#  postgresql.conf  —  STANDBY node
# ─────────────────────────────────────────────

listen_addresses = '*'
port = 5432

# Hot standby = allow read-only queries on the replica while it replays WAL
hot_standby = on

# How many seconds behind primary before we warn in logs
wal_receiver_timeout = 60s

# PERFORMANCE
shared_buffers = 128MB
work_mem = 4MB