# ─────────────────────────────────────────────
#  postgresql.conf  —  PRIMARY node
# ─────────────────────────────────────────────

# CONNECTION
listen_addresses = '*'
port = 5432

# REPLICATION — these are the critical settings
wal_level = replica            # enables WAL data needed for streaming replication
max_wal_senders = 5            # max concurrent standby connections (one per replica + buffer)
wal_keep_size = 128MB          # keep recent WAL segments so a lagging standby can catch up
max_replication_slots = 5      # allow named replication slots (optional but useful)

# PERFORMANCE (safe defaults for a demo)
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# LOGGING (helpful during development)
log_destination = 'stderr'
logging_collector = off
log_connections = on
log_replication_commands = on